name: Build

on:
  workflow_dispatch:
  push:
    paths-ignore:
    - 'README.md'
    - 'CHANGES.md'
    - 'LICENSE'

jobs:
  build:
    runs-on: macos-26
    env:
      XCODE: /Applications/Xcode_26.2.app
      XCODE_SDK: iphoneos26.2
    steps:
    - uses: actions/checkout@v6
    - name: Select Xcode Version
      run: sudo xcode-select -s '${{ env.XCODE }}/Contents/Developer'
    - name: Show Xcode Version
      run: xcodebuild -version
    - name: Build Xcode Project
      run: |
        set -o pipefail && \
          xcodebuild \
            -scheme 'Sora' \
            -sdk ${{ env.XCODE_SDK }} \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            clean build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            PROVISIONING_PROFILE=
    - name: Check WebRTC Non-public API
      run: |
        WEBRTC_FRAMEWORK=$(find build -name "WebRTC.framework" -path "*/WebRTC.xcframework/ios-arm64/*" | head -1)
        if [ -n "$WEBRTC_FRAMEWORK" ] && nm "$WEBRTC_FRAMEWORK/WebRTC" | grep _kVTVideoEncoderSpecification_RequiredLowLatency >/dev/null 2>&1; then
          echo 'Error: Non-public API detected in WebRTC framework.'
          exit 1
        fi
    - name: Format Lint
      run: |
        make fmt-lint
    - name: Lint
      run: |
        make lint
  slack_notify:
    needs: [build]
    runs-on: ubuntu-24.04
    if: always()
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-ios-sdk
