name: CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
    - 'AGENTS.md'
    - 'CHANGES.md'
    - 'CLAUDE.md'
    - 'LICENSE'
    - 'README.md'
    - 'THANKS'
    - 'canary.py'
    - '.gitignore'

jobs:
  e2e:
    runs-on: [self-hosted, macOS, ARM64, Apple-M1]
    timeout-minutes: 45
    env:
      XCODE: /Applications/Xcode.app
      XCODE_SDK: iphoneos26.5
      SORA_SIGNALING_URL: ${{ secrets.TEST_SIGNALING_URL }}
      TEST_SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      TEST_CHANNEL_ID_PREFIX: ${{ secrets.TEST_CHANNEL_ID_PREFIX }}
      TEST_CHANNEL_ID_SUFFIX: _${{ github.run_id }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Show Xcode Version
      run: xcodebuild -version
    - name: Setup iOS Simulator
      run: |
        SIMULATOR_NAME="iPhone 17 Pro"

        # デバイスの存在を確認し、存在しなければ作成する
        if ! xcrun simctl list devices available | grep -q "$SIMULATOR_NAME ("; then
          echo "Creating simulator '$SIMULATOR_NAME'"
          xcrun simctl create "$SIMULATOR_NAME" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro"
        fi

        # 起動
        xcrun simctl boot "$SIMULATOR_NAME"
        xcrun simctl bootstatus "$SIMULATOR_NAME" -b
    - name: Run E2E Tests
      run: |
        rm -rf build

        # Simulator の system log をバックグラウンドで収集する
        xcrun simctl spawn booted log stream --predicate 'processImagePath contains "Sora"' &
        LOG_PID=$!
        trap 'kill $LOG_PID 2>/dev/null || true' EXIT

        set -o pipefail && \
          xcodebuild build-for-testing \
            -scheme Sora-Package \
            -sdk ${{ env.XCODE_SDK }} \
            -derivedDataPath build \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            PROVISIONING_PROFILE= \
            SWIFT_VERSION=6

        XCTESTRUN=$(find build -name "*.xctestrun" -path "*/Products/*" | head -1)
        if [ ! -f "$XCTESTRUN" ]; then
          echo "Error: .xctestrun not found"
          exit 1
        fi
        echo "Injecting environment variables into $XCTESTRUN"
        plutil -replace TestConfigurations.0.TestTargets.0.EnvironmentVariables \
          -json "{}" "$XCTESTRUN"
        plutil -insert TestConfigurations.0.TestTargets.0.EnvironmentVariables.SORA_SIGNALING_URL \
          -string "$SORA_SIGNALING_URL" "$XCTESTRUN"
        plutil -insert TestConfigurations.0.TestTargets.0.EnvironmentVariables.TEST_SECRET_KEY \
          -string "$TEST_SECRET_KEY" "$XCTESTRUN"
        plutil -insert TestConfigurations.0.TestTargets.0.EnvironmentVariables.TEST_CHANNEL_ID_PREFIX \
          -string "$TEST_CHANNEL_ID_PREFIX" "$XCTESTRUN"
        plutil -insert TestConfigurations.0.TestTargets.0.EnvironmentVariables.TEST_CHANNEL_ID_SUFFIX \
          -string "$TEST_CHANNEL_ID_SUFFIX" "$XCTESTRUN"

        xcodebuild test-without-building \
            -xctestrun "$XCTESTRUN" \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.5' \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            PROVISIONING_PROFILE=
    - name: Shutdown Simulator
      if: always()
      run: xcrun simctl shutdown 'iPhone 17 Pro' || true
  slack_notify:
    needs: [e2e]
    runs-on: ubuntu-slim
    if: ${{ always() && needs.e2e.result != 'success' }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ needs.e2e.result }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: sora-ios-sdk
        env:
          GH_TOKEN: ${{ github.token }}
