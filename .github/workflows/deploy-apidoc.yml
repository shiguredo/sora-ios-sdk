name: deploy-apidoc

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    env:
      XCODE: /Applications/Xcode_26.2.app
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Select Xcode Version
      run: sudo xcode-select -s '${{ env.XCODE }}/Contents/Developer'
    - name: Show Xcode Version
      run: xcodebuild -version
    - name: Install Jazzy
      run: sudo gem install jazzy
    - name: Generate API Documentation
      run: jazzy
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: docs
  deploy:
    needs: [build]
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      id: deployment
  slack_notify:
    needs: [deploy]
    runs-on: ubuntu-slim
    # build が失敗して deploy が skipped になっても通知するため !cancelled() を指定する
    if: ${{ !cancelled() }}
    permissions:
      actions: read
    steps:
    - name: Slack Notification
      uses: shiguredo/github-actions/.github/actions/slack-notify@main
      with:
        status: ${{ needs.deploy.result }}
        slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
        slack_channel: sora-ios-sdk
        # Pages デプロイの失敗と復旧を Fixed 通知で捉えるため failure_and_fixed を指定する
        notify_mode: failure_and_fixed
      env:
        GH_TOKEN: ${{ github.token }}
